<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Cloudy Skies</title>

<!-- PWA / iPhone home-screen app -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#9ed2ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cloudy Skies">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #9ed2ff;
    overflow: hidden;
    font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    overscroll-behavior: none;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    /* respect the iPhone notch / home indicator */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
  }
  canvas {
    display: block;
    background: linear-gradient(#bfe3ff, #eaf6ff);
    border-radius: 10px;
    image-rendering: auto;
  }
  #mute {
    position: fixed;
    top: calc(env(safe-area-inset-top) + 6px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 40px;
    height: 40px;
    padding: 0;
    border: none;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.55);
    box-shadow: 0 1px 4px rgba(40, 60, 90, 0.25);
    font-size: 20px;
    line-height: 40px;
    text-align: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #mute:active { background: rgba(255, 255, 255, 0.8); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="400" height="640"></canvas>
</div>
<button id="mute" aria-label="Toggle music">🔊</button>
<script>
(function () {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const W = canvas.width;
  const H = canvas.height;

  // ---- Tunables (kept close to Doodle Jump feel) ----
  const GRAVITY = 0.32;
  const JUMP_V = -13.2;          // normal platform bounce
  const SPRING_V = -22;          // spring boost
  const MOVE_ACCEL = 1.7;        // snappier ramp-up
  const MAX_MOVE = 8.8;          // higher top speed
  const FRICTION = 0.78;         // quicker stop when you let go
  const TAP_KICK = 4.6;          // instant nudge the moment you press a side
  const PLAT_W = 70;
  const PLAT_H = 16;
  const SCROLL_LINE = H * 0.42;  // when bear passes this, world scrolls

  // ---- State ----
  let state = "menu";  // menu | play | dead
  const DOG_PHRASES = ["you're gee", "aww so tiny", "im gonna squeeze ma gee"];
  let bear, platforms, particles, coins, dog, cat;
  let score, scrollY, coinCount, nextDogScore, nextCatScore, highScore = 0;
  let dir = 0;          // -1 left, 1 right, 0 none (keyboard)
  let tilt = 0;         // device / pointer steering -1..1
  let frame = 0;

  try { highScore = parseInt(localStorage.getItem("cloudySkiesHi") || "0", 10) || 0; } catch (e) {}

  // ---- Sound (synthesized, no external files) ----
  let audioCtx = null;
  function unlockAudio() {
    if (audioCtx) { if (audioCtx.state === "suspended") audioCtx.resume(); return; }
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) { try { audioCtx = new AC(); } catch (e) {} }
  }
  // play a little ascending arpeggio for a coin pickup
  function coinSound(big) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const notes = big ? [784, 1047, 1319, 1568] : [988, 1319];  // big = longer, higher run
    const step = big ? 0.07 : 0.06;
    notes.forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(f, now + i * step);
      const t0 = now + i * step;
      const vol = big ? 0.18 : 0.14;
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + step + 0.05);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t0);
      osc.stop(t0 + step + 0.08);
    });
  }

  // ---- Background music (original chiptune, generated live) ----
  // A cheerful 4-chord loop (Am - F - C - G), 32 eighth-note steps.
  let musicGain = null, musicStarted = false, noiseBuf = null;
  let musicOn = true, musicStep = 0, nextNoteTime = 0, musicTimer = null;
  const STEP_DUR = 60 / 112 / 2;   // 112 BPM, eighth notes
  try { musicOn = localStorage.getItem("cloudySkiesMusic") !== "off"; } catch (e) {}

  // 0 = rest. Lead in A-minor pentatonic; bass walks the chord roots/fifths.
  const LEAD = [
    440, 523, 659,   0, 587, 523, 440,   0,   // Am
    523,   0, 440, 523, 587,   0, 523, 440,    // F
    659,   0, 784, 659, 523,   0, 587, 659,    // C
    587,   0, 494, 587, 784,   0, 587, 494     // G
  ];
  const BASS = [
    110, 0, 165, 0, 110, 0, 165, 0,            // A
    87,  0, 131, 0, 87,  0, 131, 0,            // F
    131, 0, 196, 0, 131, 0, 196, 0,            // C
    98,  0, 147, 0, 98,  0, 147, 0             // G
  ];

  function tone(freq, time, dur, type, vol) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, time);
    g.gain.exponentialRampToValueAtTime(vol, time + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    o.connect(g).connect(musicGain);
    o.start(time);
    o.stop(time + dur + 0.05);
  }
  function kick(time) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.setValueAtTime(140, time);
    o.frequency.exponentialRampToValueAtTime(50, time + 0.12);
    g.gain.setValueAtTime(0.16, time);
    g.gain.exponentialRampToValueAtTime(0.0001, time + 0.16);
    o.connect(g).connect(musicGain);
    o.start(time);
    o.stop(time + 0.18);
  }
  function hat(time) {
    if (!noiseBuf) return;
    const s = audioCtx.createBufferSource();
    s.buffer = noiseBuf;
    const f = audioCtx.createBiquadFilter();
    f.type = "highpass";
    f.frequency.value = 7000;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.035, time);
    g.gain.exponentialRampToValueAtTime(0.0001, time + 0.05);
    s.connect(f).connect(g).connect(musicGain);
    s.start(time);
    s.stop(time + 0.06);
  }

  function scheduleMusic() {
    if (!audioCtx) return;
    while (nextNoteTime < audioCtx.currentTime + 0.12) {
      const i = musicStep % 32;
      if (LEAD[i]) tone(LEAD[i], nextNoteTime, STEP_DUR * 0.9, "square", 0.05);
      if (BASS[i]) tone(BASS[i], nextNoteTime, STEP_DUR * 1.5, "triangle", 0.09);
      if (i % 4 === 0) kick(nextNoteTime);            // beat
      if (i % 2 === 1) hat(nextNoteTime);             // offbeat shimmer
      nextNoteTime += STEP_DUR;
      musicStep++;
    }
  }

  function startMusic() {
    if (musicStarted || !audioCtx) return;
    musicStarted = true;
    // one-time noise buffer for the hi-hat
    noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
    const data = noiseBuf.getChannelData(0);
    for (let k = 0; k < data.length; k++) data[k] = Math.random() * 2 - 1;
    musicGain = audioCtx.createGain();
    musicGain.gain.value = musicOn ? 0.32 : 0.0;
    musicGain.connect(audioCtx.destination);
    nextNoteTime = audioCtx.currentTime + 0.1;
    musicStep = 0;
    musicTimer = setInterval(scheduleMusic, 25);
  }

  function setMusic(on) {
    musicOn = on;
    try { localStorage.setItem("cloudySkiesMusic", on ? "on" : "off"); } catch (e) {}
    if (musicGain) musicGain.gain.value = on ? 0.32 : 0.0;
    const btn = document.getElementById("mute");
    if (btn) btn.textContent = on ? "🔊" : "🔇";
  }

  (function initMuteButton() {
    const btn = document.getElementById("mute");
    if (!btn) return;
    btn.textContent = musicOn ? "🔊" : "🔇";
    btn.addEventListener("pointerdown", (e) => {
      e.stopPropagation();
      unlockAudio();
      startMusic();
      setMusic(!musicOn);
    });
  })();

  function reset() {
    bear = { x: W / 2, y: H - 120, vx: 0, vy: JUMP_V, w: 46, h: 42, face: 1, flap: 0 };
    platforms = [];
    particles = [];
    coins = [];
    dog = null;
    cat = null;
    score = 0;
    coinCount = 0;
    nextDogScore = 500;
    nextCatScore = 1500;
    scrollY = 0;

    // Starting platform right under the bear
    platforms.push(makePlatform(W / 2 - PLAT_W / 2, H - 70, "normal"));

    // Fill the screen going up
    let y = H - 70;
    while (y > -40) {
      y -= 60 + Math.random() * 55;
      spawnPlatformAt(y);
    }
  }

  function makePlatform(x, y, type) {
    const p = { x, y, w: PLAT_W, h: PLAT_H, type, vx: 0, broken: false, spring: false };
    if (type === "moving") p.vx = (Math.random() < 0.5 ? -1 : 1) * (1 + Math.random() * 1.2);
    if (Math.random() < 0.18 && type !== "broken") p.spring = true;
    return p;
  }

  function spawnPlatformAt(y) {
    const x = Math.random() * (W - PLAT_W);
    let type = "normal";
    const r = Math.random();
    const difficulty = Math.min(score / 6000, 1);
    if (r < 0.12 + difficulty * 0.15) type = "moving";
    else if (r < 0.22 + difficulty * 0.18) type = "broken";
    platforms.push(makePlatform(x, y, type));

    // sometimes float a coin just above a (solid) cloud.
    // ~12% of those are a rarer BIG coin worth a lot more.
    if (type !== "broken" && Math.random() < 0.28) {
      const big = Math.random() < 0.12;
      coins.push({
        x: x + PLAT_W / 2, y: y - (big ? 34 : 28),
        r: big ? 17 : 11, big: big, taken: false,
        spin: Math.random() * Math.PI * 2
      });
    }
  }

  // ---- Input ----
  window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft" || e.key === "a") dir = -1;
    else if (e.key === "ArrowRight" || e.key === "d") dir = 1;
    else if ((e.key === " " || e.key === "Enter")) {
      unlockAudio();
      startMusic();
      if (state !== "play") { startGame(); }
    }
  });
  window.addEventListener("keyup", (e) => {
    if ((e.key === "ArrowLeft" || e.key === "a") && dir === -1) dir = 0;
    if ((e.key === "ArrowRight" || e.key === "d") && dir === 1) dir = 0;
  });

  // Touch steering: press-and-hold the LEFT or RIGHT half of the screen.
  // Tracks every active finger so quick left/right swaps respond instantly.
  const held = new Map();   // pointerId -> -1 (left) or 1 (right)

  function sideOf(clientX) {
    const rect = canvas.getBoundingClientRect();
    return (clientX - rect.left) < rect.width / 2 ? -1 : 1;
  }
  function applyHeld() {
    // most-recent press wins, so tapping the other side flips direction at once
    let d = 0;
    for (const v of held.values()) d = v;
    dir = d;
  }

  canvas.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    unlockAudio();   // browsers require a user gesture to start audio
    startMusic();
    if (state !== "play") { startGame(); return; }
    const side = sideOf(e.clientX);
    held.set(e.pointerId, side);
    applyHeld();
    // instant kick so the bear reacts the very frame you touch
    if (Math.sign(bear.vx) !== side) bear.vx = side * TAP_KICK;
    else bear.vx += side * TAP_KICK * 0.5;
  });
  function release(e) {
    if (held.has(e.pointerId)) { held.delete(e.pointerId); applyHeld(); }
  }
  canvas.addEventListener("pointerup", release);
  canvas.addEventListener("pointercancel", release);
  canvas.addEventListener("pointerleave", release);

  function startGame() {
    reset();
    state = "play";
  }

  // ---- Update ----
  function update() {
    frame++;
    if (state !== "play") return;

    // horizontal control
    let steer = dir !== 0 ? dir : tilt;
    bear.vx += steer * MOVE_ACCEL;
    if (steer === 0) bear.vx *= FRICTION;
    bear.vx = Math.max(-MAX_MOVE, Math.min(MAX_MOVE, bear.vx));
    bear.x += bear.vx;
    if (bear.vx > 0.3) bear.face = 1;
    else if (bear.vx < -0.3) bear.face = -1;

    // wrap around edges (classic Doodle Jump)
    if (bear.x < -bear.w / 2) bear.x = W + bear.w / 2;
    else if (bear.x > W + bear.w / 2) bear.x = -bear.w / 2;

    // gravity
    bear.vy += GRAVITY;
    bear.y += bear.vy;
    bear.flap += bear.vy < 0 ? 0.4 : 0.15;

    // moving platforms
    for (const p of platforms) {
      if (p.type === "moving" && !p.broken) {
        p.x += p.vx;
        if (p.x < 0) { p.x = 0; p.vx *= -1; }
        if (p.x + p.w > W) { p.x = W - p.w; p.vx *= -1; }
      }
    }

    // collision (only when falling)
    if (bear.vy > 0) {
      const bx = bear.x - bear.w * 0.34;
      const bw = bear.w * 0.68;
      const feet = bear.y + bear.h / 2;
      for (const p of platforms) {
        if (p.broken) continue;
        if (feet >= p.y && feet <= p.y + p.h + bear.vy &&
            bx + bw > p.x && bx < p.x + p.w &&
            bear.y < p.y) {
          if (p.type === "broken") {
            p.broken = true;
            spawnPieces(p);
            continue; // fall through it
          }
          if (p.spring) {
            bear.vy = SPRING_V;
            puff(bear.x, feet, "#ffd34d");
          } else {
            bear.vy = JUMP_V;
            puff(bear.x, feet, "#ffffff");
          }
          break;
        }
      }
    }

    // collect coins (fly through them)
    for (const c of coins) {
      if (c.taken) continue;
      c.spin += 0.12;
      const dx = bear.x - c.x;
      const dy2 = bear.y - c.y;
      if (dx * dx + dy2 * dy2 < (c.r + bear.w * 0.4) * (c.r + bear.w * 0.4)) {
        c.taken = true;
        coinCount += c.big ? 5 : 1;
        score += c.big ? 250 : 50;
        sparkle(c.x, c.y, c.big);
        coinSound(c.big);
      }
    }

    // scroll world when climbing high
    if (bear.y < SCROLL_LINE) {
      const dy = SCROLL_LINE - bear.y;
      bear.y = SCROLL_LINE;
      scrollY += dy;
      score += dy * 0.1;
      for (const p of platforms) p.y += dy;
      for (const pc of particles) pc.y += dy;
      for (const c of coins) c.y += dy;
    }

    // recycle platforms that fell off bottom; spawn new on top
    let highest = H;
    platforms = platforms.filter((p) => p.y < H + 30);
    coins = coins.filter((c) => !c.taken && c.y < H + 30);
    for (const p of platforms) highest = Math.min(highest, p.y);
    while (highest > -10) {
      highest -= 55 + Math.random() * 60;
      spawnPlatformAt(highest);
    }

    // particles
    for (const pc of particles) {
      pc.x += pc.vx;
      pc.y += pc.vy;
      pc.vy += 0.25;
      pc.life--;
    }
    particles = particles.filter((pc) => pc.life > 0);

    // every 500 points, a smiling Maltese peeks in from a random side
    if (score >= nextDogScore) {
      nextDogScore += 500;
      if (!dog) {
        dog = {
          side: Math.random() < 0.5 ? -1 : 1,
          y: 150 + Math.random() * (H - 320),
          t: 0, life: 80,
          phrase: DOG_PHRASES[(Math.random() * DOG_PHRASES.length) | 0]
        };
      }
    }
    if (dog) {
      dog.t++;
      if (dog.t >= dog.life) dog = null;
    }

    // every 1500 points, a grey cat peeks in (same behaviour as the dog)
    if (score >= nextCatScore) {
      nextCatScore += 1500;
      if (!cat) {
        cat = {
          side: Math.random() < 0.5 ? -1 : 1,
          y: 150 + Math.random() * (H - 320),
          t: 0, life: 80,
          phrase: DOG_PHRASES[(Math.random() * DOG_PHRASES.length) | 0]
        };
      }
    }
    if (cat) {
      cat.t++;
      if (cat.t >= cat.life) cat = null;
    }

    // death: fell below screen
    if (bear.y - bear.h / 2 > H) {
      state = "dead";
      const s = Math.floor(score);
      if (s > highScore) {
        highScore = s;
        try { localStorage.setItem("cloudySkiesHi", String(highScore)); } catch (e) {}
      }
    }
  }

  function puff(x, y, color) {
    for (let i = 0; i < 6; i++) {
      particles.push({
        x, y, vx: (Math.random() - 0.5) * 3, vy: Math.random() * -1,
        life: 18 + Math.random() * 10, color, r: 3 + Math.random() * 4
      });
    }
  }
  // twinkling star burst for coin pickups
  function sparkle(x, y, big) {
    const n = big ? 16 : 9;
    const cols = ["#fff6c0", "#ffe07a", "#ffd34d", "#ffffff"];
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = (big ? 2.5 : 1.6) + Math.random() * (big ? 3 : 2);
      particles.push({
        x, y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 0.5,
        life: 22 + Math.random() * 16,
        color: cols[(Math.random() * cols.length) | 0],
        r: (big ? 2.5 : 1.8) + Math.random() * 2.5,
        star: true, spin: Math.random() * Math.PI
      });
    }
  }
  function spawnPieces(p) {
    for (let i = 0; i < 8; i++) {
      particles.push({
        x: p.x + Math.random() * p.w, y: p.y, vx: (Math.random() - 0.5) * 4,
        vy: Math.random() * -2, life: 30, color: "#c98a4a", r: 3 + Math.random() * 3
      });
    }
  }

  // ---- Render ----
  function drawCloud(x, y, s, a) {
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(x, y, 18 * s, 0, Math.PI * 2);
    ctx.arc(x + 20 * s, y + 4 * s, 22 * s, 0, Math.PI * 2);
    ctx.arc(x + 44 * s, y, 16 * s, 0, Math.PI * 2);
    ctx.arc(x + 22 * s, y - 12 * s, 16 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function starPath(r, points, inner) {
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const rad = (i % 2 === 0) ? r : r * inner;
      const a = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
      const px = Math.cos(a) * rad, py = Math.sin(a) * rad;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
  }

  function drawCoin(c) {
    if (c.taken) return;
    const wob = Math.abs(Math.cos(c.spin));  // 0..1 spinning squash
    ctx.save();
    ctx.translate(c.x, c.y);
    // soft glow (bigger + warmer for big coins)
    ctx.globalAlpha = c.big ? 0.5 : 0.35;
    ctx.fillStyle = c.big ? "#ffd24d" : "#ffe9a0";
    ctx.beginPath();
    ctx.arc(0, 0, c.r + (c.big ? 8 : 4), 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // coin body (squashes on the x axis as it spins)
    ctx.scale(0.25 + wob * 0.75, 1);
    ctx.fillStyle = c.big ? "#ffb300" : "#f6c024";
    ctx.strokeStyle = c.big ? "#b9760a" : "#c8901a";
    ctx.lineWidth = c.big ? 3 : 2;
    ctx.beginPath();
    ctx.arc(0, 0, c.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // inner ring
    ctx.strokeStyle = c.big ? "#ffe9a0" : "#ffe07a";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, c.r * 0.62, 0, Math.PI * 2);
    ctx.stroke();
    if (c.big) {
      // engraved star marks a big coin
      ctx.fillStyle = "#fff3c4";
      starPath(c.r * 0.5, 5, 0.45);
      ctx.fill();
    }
    // shine highlight
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.beginPath();
    ctx.arc(-c.r * 0.25, -c.r * 0.3, c.r * 0.16, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawBackground() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#9ed2ff");
    g.addColorStop(1, "#eaf7ff");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // parallax clouds based on scroll
    const off = (scrollY * 0.3) % 220;
    for (let i = 0; i < 6; i++) {
      const cy = (i * 220 + off) % (H + 220) - 110;
      const cx = (i * 137 % W);
      drawCloud(cx, cy, 0.9, 0.55);
    }
  }

  function drawPlatform(p) {
    if (p.broken) return;
    const x = p.x, y = p.y;
    // cloud-style platform
    ctx.save();
    let base = p.type === "moving" ? "#b8e0ff" : "#ffffff";
    ctx.fillStyle = base;
    ctx.strokeStyle = "rgba(120,160,200,0.5)";
    ctx.lineWidth = 2;
    roundRect(x, y, p.w, p.h, 8);
    ctx.fill();
    // little bumps to look cloudy
    ctx.beginPath();
    ctx.arc(x + 14, y + 4, 10, 0, Math.PI * 2);
    ctx.arc(x + 36, y + 2, 12, 0, Math.PI * 2);
    ctx.arc(x + 56, y + 5, 9, 0, Math.PI * 2);
    ctx.fill();

    if (p.spring) {
      // a little spring/feather boost marker
      ctx.fillStyle = "#ffb23e";
      ctx.beginPath();
      ctx.moveTo(x + p.w / 2 - 8, y - 2);
      ctx.lineTo(x + p.w / 2, y - 16);
      ctx.lineTo(x + p.w / 2 + 8, y - 2);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawBear() {
    const b = bear;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.scale(b.face, 1);

    const brown = "#9b5d33";
    const darkB = "#7a4626";
    const light = "#c98a4a";

    // wings (flap with vertical motion)
    const wf = Math.sin(b.flap) * 0.5 + (b.vy < 0 ? 0.9 : 0.3);
    ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.strokeStyle = "rgba(180,200,220,0.7)";
    ctx.lineWidth = 1.5;
    // back wing
    drawWing(-6, -2, -1, wf);
    // front wing
    drawWing(-6, -2, 1, wf * 0.85);

    // body
    ctx.fillStyle = brown;
    ctx.beginPath();
    ctx.ellipse(0, 6, 17, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    // belly
    ctx.fillStyle = light;
    ctx.beginPath();
    ctx.ellipse(2, 9, 9, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    // legs
    ctx.fillStyle = darkB;
    ctx.beginPath();
    ctx.ellipse(-7, 20, 5, 4, 0, 0, Math.PI * 2);
    ctx.ellipse(8, 20, 5, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // head
    ctx.fillStyle = brown;
    ctx.beginPath();
    ctx.arc(7, -10, 14, 0, Math.PI * 2);
    ctx.fill();
    // ears
    ctx.beginPath();
    ctx.arc(0, -20, 5, 0, Math.PI * 2);
    ctx.arc(15, -19, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = light;
    ctx.beginPath();
    ctx.arc(0, -20, 2.4, 0, Math.PI * 2);
    ctx.arc(15, -19, 2.4, 0, Math.PI * 2);
    ctx.fill();
    // muzzle
    ctx.fillStyle = light;
    ctx.beginPath();
    ctx.ellipse(12, -6, 7, 5.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // nose
    ctx.fillStyle = "#3a2415";
    ctx.beginPath();
    ctx.arc(15, -8, 2.4, 0, Math.PI * 2);
    ctx.fill();
    // eyes
    ctx.fillStyle = "#2a1a0f";
    ctx.beginPath();
    ctx.arc(4, -13, 2.2, 0, Math.PI * 2);
    ctx.arc(13, -13, 2.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(4.7, -13.7, 0.8, 0, Math.PI * 2);
    ctx.arc(13.7, -13.7, 0.8, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawWing(ox, oy, side, spread) {
    ctx.save();
    ctx.translate(ox, oy);
    const sp = 0.5 + spread;     // how raised
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(-18 * side, -14 * sp, -26 * side, -2 * sp);
    ctx.quadraticCurveTo(-20 * side, 2, -14 * side, 8);
    ctx.quadraticCurveTo(-10 * side, 2, 0, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // feather lines
    ctx.strokeStyle = "rgba(170,190,210,0.6)";
    ctx.beginPath();
    ctx.moveTo(-6 * side, 0); ctx.lineTo(-16 * side, -3 * sp);
    ctx.moveTo(-7 * side, 3); ctx.lineTo(-15 * side, 2);
    ctx.stroke();
    ctx.restore();
  }

  // smiling white Maltese that peeks around the edge of the screen
  function drawDog(d) {
    const prog = Math.min(d.t / d.life, 1);
    const peek = Math.sin(prog * Math.PI);   // 0 -> 1 -> 0 (slide in then out)
    const reach = 92;
    const cx = d.side === -1 ? (peek * reach) : (W - peek * reach);

    ctx.save();
    ctx.translate(cx, d.y);
    ctx.scale(d.side === -1 ? 1 : -1, 1);     // always face into the screen
    // gentle bob
    ctx.translate(0, Math.sin(d.t * 0.25) * 2);

    const fur = "#ffffff";
    const shade = "#e6edf4";
    const dark = "#2a2118";

    // body trailing off behind the edge (mostly hidden)
    ctx.fillStyle = fur;
    ctx.strokeStyle = shade;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(-30, 16, 26, 22, 0, 0, Math.PI * 2);
    ctx.fill();

    // a little paw resting on the edge
    ctx.beginPath();
    ctx.ellipse(-6, 34, 8, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // floppy ears (behind head) - long Maltese ears
    ctx.fillStyle = shade;
    ctx.beginPath();
    ctx.ellipse(-12, 6, 11, 20, 0.3, 0, Math.PI * 2);   // back ear
    ctx.fill();
    ctx.fillStyle = fur;
    ctx.beginPath();
    ctx.ellipse(20, 8, 11, 21, -0.25, 0, Math.PI * 2);   // front ear
    ctx.fill();
    ctx.strokeStyle = shade;
    ctx.stroke();

    // head
    ctx.fillStyle = fur;
    ctx.strokeStyle = shade;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(4, -6, 25, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // little top-knot tuft of fur
    ctx.beginPath();
    ctx.arc(0, -28, 7, 0, Math.PI * 2);
    ctx.arc(10, -28, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // muzzle
    ctx.fillStyle = fur;
    ctx.beginPath();
    ctx.ellipse(15, 4, 13, 11, 0, 0, Math.PI * 2);
    ctx.fill();

    // eyes (happy)
    ctx.fillStyle = dark;
    ctx.beginPath();
    ctx.arc(2, -8, 3, 0, Math.PI * 2);
    ctx.arc(16, -8, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(3, -9, 1, 0, Math.PI * 2);
    ctx.arc(17, -9, 1, 0, Math.PI * 2);
    ctx.fill();

    // rosy cheek
    ctx.fillStyle = "rgba(255,170,170,0.5)";
    ctx.beginPath();
    ctx.arc(22, 4, 4, 0, Math.PI * 2);
    ctx.fill();

    // nose
    ctx.fillStyle = dark;
    ctx.beginPath();
    ctx.ellipse(20, 0, 3.6, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // big smiling mouth (open, with tongue)
    ctx.strokeStyle = dark;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(20, 3);
    ctx.quadraticCurveTo(20, 13, 12, 13);   // smile curving up at the end
    ctx.moveTo(20, 3);
    ctx.quadraticCurveTo(22, 12, 28, 12);
    ctx.stroke();
    // tongue
    ctx.fillStyle = "#ff8fa3";
    ctx.beginPath();
    ctx.ellipse(20, 13, 4, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();   // undo the mirror so the speech text is never flipped
    drawCritterBubble(d, cx, peek);
  }

  // shared speech bubble (screen space) used by both the dog and the cat
  function drawCritterBubble(d, cx, peek) {
    const face = d.side === -1 ? 1 : -1;   // direction into the screen
    const bobY = Math.sin(d.t * 0.25) * 2;
    const mouthX = cx + face * 20;
    const mouthY = d.y + bobY + 5;

    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, peek * 1.4));
    ctx.font = "bold 16px 'Comic Sans MS', sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "alphabetic";
    const text = d.phrase || "you're gee";
    const tw = ctx.measureText(text).width;
    const padX = 12, bw = tw + padX * 2, bh = 30;
    const nearX = mouthX + face * 12;
    const bx = face === 1 ? nearX : nearX - bw;
    const by = mouthY - bh - 14;

    const base1X = mouthX + face * 14;
    const base2X = base1X + face * 12;
    const baseY = by + bh;
    const apexX = mouthX + face * 2;
    const apexY = mouthY - 2;

    // bubble body
    ctx.fillStyle = "#ffffff";
    ctx.strokeStyle = "rgba(120,160,200,0.8)";
    ctx.lineWidth = 2;
    roundRect(bx, by, bw, bh, 10);
    ctx.fill();
    ctx.stroke();

    // tail: fill over the bubble's bottom edge, then stroke only its two sides
    ctx.beginPath();
    ctx.moveTo(base1X, baseY);
    ctx.lineTo(base2X, baseY);
    ctx.lineTo(apexX, apexY);
    ctx.closePath();
    ctx.fillStyle = "#ffffff";
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(base1X, baseY);
    ctx.lineTo(apexX, apexY);
    ctx.lineTo(base2X, baseY);
    ctx.stroke();

    // text
    ctx.fillStyle = "#2a4a7a";
    ctx.fillText(text, bx + padX, by + 20);
    ctx.restore();
  }

  // grey cat - same peek-in behaviour as the dog, different look
  function drawCat(d) {
    const prog = Math.min(d.t / d.life, 1);
    const peek = Math.sin(prog * Math.PI);
    const reach = 92;
    const cx = d.side === -1 ? (peek * reach) : (W - peek * reach);

    ctx.save();
    ctx.translate(cx, d.y);
    ctx.scale(d.side === -1 ? 1 : -1, 1);     // always face into the screen
    ctx.translate(0, Math.sin(d.t * 0.25) * 2);

    const grey = "#9aa3ab", shade = "#7f888f", light = "#c7cdd2", dark = "#2a2118", pink = "#f3a6b5";

    // body trailing off behind the edge
    ctx.fillStyle = grey;
    ctx.strokeStyle = shade;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(-30, 16, 26, 22, 0, 0, Math.PI * 2);
    ctx.fill();

    // tail curling up over the edge
    ctx.strokeStyle = grey;
    ctx.lineWidth = 8;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(-44, 20);
    ctx.quadraticCurveTo(-62, -2, -44, -18);
    ctx.stroke();
    ctx.lineCap = "butt";

    // a paw resting on the edge
    ctx.fillStyle = grey;
    ctx.strokeStyle = shade;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(-6, 34, 8, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // pointy ears
    ctx.fillStyle = grey;
    ctx.beginPath();
    ctx.moveTo(-12, -24); ctx.lineTo(-2, -3); ctx.lineTo(-21, -7); ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(16, -26); ctx.lineTo(23, -3); ctx.lineTo(4, -5); ctx.closePath();
    ctx.fill();
    // inner ears
    ctx.fillStyle = pink;
    ctx.beginPath();
    ctx.moveTo(-11, -19); ctx.lineTo(-6, -7); ctx.lineTo(-16, -9); ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(15, -20); ctx.lineTo(18, -7); ctx.lineTo(8, -8); ctx.closePath();
    ctx.fill();

    // head
    ctx.fillStyle = grey;
    ctx.strokeStyle = shade;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(4, -6, 24, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // subtle tabby stripes
    ctx.strokeStyle = shade;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-1, -28); ctx.lineTo(1, -20);
    ctx.moveTo(6, -29); ctx.lineTo(6, -20);
    ctx.moveTo(13, -28); ctx.lineTo(11, -20);
    ctx.stroke();

    // muzzle
    ctx.fillStyle = light;
    ctx.beginPath();
    ctx.ellipse(13, 6, 13, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    // eyes (happy)
    ctx.fillStyle = dark;
    ctx.beginPath();
    ctx.arc(2, -8, 3, 0, Math.PI * 2);
    ctx.arc(16, -8, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(3, -9, 1, 0, Math.PI * 2);
    ctx.arc(17, -9, 1, 0, Math.PI * 2);
    ctx.fill();

    // pink nose
    ctx.fillStyle = pink;
    ctx.beginPath();
    ctx.moveTo(15, 2); ctx.lineTo(22, 2); ctx.lineTo(18.5, 6); ctx.closePath();
    ctx.fill();

    // smiling mouth
    ctx.strokeStyle = dark;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(18.5, 6);
    ctx.quadraticCurveTo(13, 13, 8, 9);
    ctx.moveTo(18.5, 6);
    ctx.quadraticCurveTo(24, 13, 29, 9);
    ctx.stroke();

    // whiskers
    ctx.strokeStyle = "rgba(120,128,135,0.85)";
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(22, 4); ctx.lineTo(40, 1);
    ctx.moveTo(22, 7); ctx.lineTo(40, 9);
    ctx.moveTo(6, 5); ctx.lineTo(-10, 3);
    ctx.moveTo(6, 8); ctx.lineTo(-10, 11);
    ctx.stroke();

    ctx.restore();
    drawCritterBubble(d, cx, peek);
  }

  function drawParticles() {
    for (const pc of particles) {
      ctx.globalAlpha = Math.max(0, pc.life / 28);
      ctx.fillStyle = pc.color;
      if (pc.star) {
        ctx.save();
        ctx.translate(pc.x, pc.y);
        ctx.rotate((pc.spin || 0) + pc.life * 0.2);
        starPath(pc.r * 1.6, 4, 0.4);
        ctx.fill();
        ctx.restore();
      } else {
        ctx.beginPath();
        ctx.arc(pc.x, pc.y, pc.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawHUD() {
    ctx.fillStyle = "rgba(40,60,90,0.85)";
    ctx.font = "bold 26px 'Comic Sans MS', sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(String(Math.floor(score)), 14, 34);
    ctx.font = "13px 'Comic Sans MS', sans-serif";
    ctx.fillStyle = "rgba(40,60,90,0.6)";
    ctx.fillText("BEST " + highScore, 14, 52);

    // coin counter (top right)
    ctx.save();
    drawCoin({ x: W - 56, y: 26, r: 9, taken: false, spin: 0.6 });
    ctx.restore();
    ctx.fillStyle = "rgba(40,60,90,0.85)";
    ctx.font = "bold 22px 'Comic Sans MS', sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("x " + coinCount, W - 42, 34);
  }

  function wrapText(text, maxW) {
    const words = text.split(" ");
    const lines = [];
    let line = "";
    for (const w of words) {
      const test = line ? line + " " + w : w;
      if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
      else line = test;
    }
    if (line) lines.push(line);
    return lines;
  }

  function drawMenu() {
    drawBackground();
    drawCloud(70, 70, 0.8, 0.55);
    drawCloud(300, 120, 0.7, 0.55);

    // title
    ctx.textAlign = "center";
    ctx.fillStyle = "#2a4a7a";
    ctx.font = "bold 40px 'Comic Sans MS', sans-serif";
    ctx.fillText("Cloudy Skies", W / 2, 92);

    // ---- Tiny's intro speech bubble ----
    ctx.font = "16px 'Comic Sans MS', sans-serif";
    const msg = "Hi there! My name is Tiny, and I need your help getting to the very top! Can you please help me?";
    const maxTextW = 250;
    const lines = wrapText(msg, maxTextW);
    const lineH = 22, padX = 18, padY = 16;
    const bw = maxTextW + padX * 2;
    const bh = lines.length * lineH + padY * 2;
    const bx = W / 2 - bw / 2;
    const by = 122;

    ctx.fillStyle = "#ffffff";
    ctx.strokeStyle = "rgba(120,160,200,0.85)";
    ctx.lineWidth = 2.5;
    roundRect(bx, by, bw, bh, 16);
    ctx.fill();
    ctx.stroke();
    // tail pointing down to the bear
    const tailX = W / 2;
    ctx.beginPath();
    ctx.moveTo(tailX - 14, by + bh);
    ctx.lineTo(tailX + 14, by + bh);
    ctx.lineTo(tailX, by + bh + 22);
    ctx.closePath();
    ctx.fillStyle = "#ffffff";
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(tailX - 14, by + bh);
    ctx.lineTo(tailX, by + bh + 22);
    ctx.lineTo(tailX + 14, by + bh);
    ctx.strokeStyle = "rgba(120,160,200,0.85)";
    ctx.stroke();
    // message text
    ctx.fillStyle = "#2a4a7a";
    ctx.font = "16px 'Comic Sans MS', sans-serif";
    ctx.textAlign = "center";
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], W / 2, by + padY + (i + 1) * lineH - 6);
    }

    // bear hovering below the bubble
    bear = bear || { x: W / 2, y: 320, vx: 0, vy: 0, w: 46, h: 42, face: 1, flap: 0 };
    bear.x = W / 2; bear.y = by + bh + 78 + Math.sin(frame * 0.06) * 8;
    bear.flap = frame * 0.2; bear.face = 1; bear.vy = -1;
    drawBear();

    // ---- start button ----
    const btnW = 180, btnH = 54, btnX = W / 2 - btnW / 2, btnY = 452;
    const glow = 0.5 + Math.sin(frame * 0.09) * 0.5;
    ctx.save();
    ctx.shadowColor = "rgba(255,180,60,0.8)";
    ctx.shadowBlur = 10 + glow * 14;
    ctx.fillStyle = "#ffb23e";
    ctx.strokeStyle = "#e07d1a";
    ctx.lineWidth = 3;
    roundRect(btnX, btnY, btnW, btnH, 27);
    ctx.fill();
    ctx.restore();
    ctx.strokeStyle = "#e07d1a";
    ctx.lineWidth = 3;
    roundRect(btnX, btnY, btnW, btnH, 27);
    ctx.stroke();
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 24px 'Comic Sans MS', sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("Tap to Fly", W / 2, btnY + btnH / 2 + 1);
    ctx.textBaseline = "alphabetic";

    // hint
    ctx.fillStyle = "rgba(42,74,122,0.85)";
    ctx.font = "14px 'Comic Sans MS', sans-serif";
    ctx.fillText("Hold the LEFT or RIGHT side to steer", W / 2, 528);
    if (highScore > 0) ctx.fillText("Best: " + highScore, W / 2, 552);
  }

  function drawDead() {
    // dim
    ctx.fillStyle = "rgba(20,30,55,0.55)";
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = "center";
    ctx.fillStyle = "#fff";
    ctx.font = "bold 40px 'Comic Sans MS', sans-serif";
    ctx.fillText("Down you go!", W / 2, 250);
    ctx.font = "bold 30px 'Comic Sans MS', sans-serif";
    ctx.fillText("Score " + Math.floor(score), W / 2, 306);
    drawCoin({ x: W / 2 - 34, y: 338, r: 11, taken: false, spin: 0.6 });
    ctx.fillStyle = "#ffd34d";
    ctx.font = "bold 24px 'Comic Sans MS', sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("x " + coinCount, W / 2 - 16, 346);
    ctx.textAlign = "center";
    ctx.fillStyle = "#fff";
    ctx.font = "18px 'Comic Sans MS', sans-serif";
    ctx.fillText("Best " + highScore, W / 2, 378);
    ctx.font = "bold 22px 'Comic Sans MS', sans-serif";
    ctx.fillStyle = "#ffd34d";
    ctx.fillText("Tap to fly again", W / 2, 430);
  }

  // ---- Main loop ----
  function loop() {
    update();

    if (state === "menu") {
      drawMenu();
    } else {
      drawBackground();
      for (const p of platforms) drawPlatform(p);
      for (const c of coins) drawCoin(c);
      drawParticles();
      drawBear();
      if (dog) drawDog(dog);
      if (cat) drawCat(cat);
      drawHUD();
      if (state === "dead") drawDead();
    }

    requestAnimationFrame(loop);
  }

  // Scale canvas to fill the screen (keeping aspect ratio) inside the safe area
  function fit() {
    const cs = getComputedStyle(document.getElementById("wrap"));
    const padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
    const padY = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
    const maxW = window.innerWidth - padX;
    const maxH = window.innerHeight - padY;
    const scale = Math.min(maxW / W, maxH / H);
    canvas.style.width = (W * scale) + "px";
    canvas.style.height = (H * scale) + "px";
  }
  window.addEventListener("resize", fit);
  window.addEventListener("orientationchange", () => setTimeout(fit, 200));
  fit();

  // prevent the page itself from scrolling / rubber-banding on iOS
  document.addEventListener("touchmove", (e) => e.preventDefault(), { passive: false });

  // register the offline service worker (works once hosted over https)
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }

  loop();
})();
</script>
</body>
